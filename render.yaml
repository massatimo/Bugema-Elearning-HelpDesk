services:
  - type: web
    name: bugema-school
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: PORT
        value: "10000"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: bugema_school
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: ""
      - key: QUEUE_CONNECTION
        value: database
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: REDIS_PORT
        value: "6379"
    autoDeploy: true

  - type: worker
    name: bugema-school-worker
    env: docker
    branch: main
    dockerfilePath: Dockerfile
    startCommand: php artisan queue:work --sleep=3 --tries=3
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        value: 127.0.0.1
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: bugema_school
      - key: DB_USERNAME
        value: root
      - key: DB_PASSWORD
        value: ""
      - key: QUEUE_CONNECTION
        value: database
      - key: REDIS_HOST
        value: 127.0.0.1
      - key: REDIS_PORT
        value: "6379"
    autoDeploy: true
